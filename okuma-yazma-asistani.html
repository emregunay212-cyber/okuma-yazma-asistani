<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"/>
<meta name="theme-color" content="#534AB7"/>
<meta name="color-scheme" content="light"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Asistanım"/>
<title>Okuma Yazma Asistanım</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
button,textarea,input,a{-webkit-tap-highlight-color:transparent}
button{touch-action:manipulation}
:root{
  /* Mor (marka) */
  --p50:#EFEBFF;--p100:#D9D3FA;--p400:#8B7FE8;--p600:#534AB7;--p800:#332B73;
  /* Yeşil / teal */
  --t50:#DEF3EC;--t400:#1D9E75;--t800:#085041;
  /* Amber */
  --a50:#FCEFD6;--a400:#BA7517;
  /* Sıcak nötrler (kâğıt) */
  --g50:#FBF7EF;--g100:#EEE7D8;--g200:#DCD3C0;--g400:#928A78;--g600:#5C5446;--g900:#2B2620;
  /* Neşeli vurgu renkleri (kartlar & oyunlar) */
  --coral:#F4734E;--coral-bg:#FCE6DD;
  --sun:#EC9B23;--sun-bg:#FBEBCF;
  --mint:#1FA98C;--mint-bg:#D8F1E9;
  --sky:#3E8ED0;--sky-bg:#DEEDFB;
  --rose:#D9588A;--rose-bg:#FAE2EC;
  --grape:#7C5CD6;--grape-bg:#EAE3FB;
  --rsm:10px;--rmd:14px;--rlg:20px;--rxl:26px;
  --fn:'Nunito',system-ui,sans-serif;
  --fd:'Baloo 2','Nunito',system-ui,sans-serif;
  --sw:264px;
  --sh-sm:0 2px 6px rgba(60,42,20,.06);
  --sh-md:0 8px 22px rgba(60,42,20,.10);
  --sh-lg:0 16px 40px rgba(60,42,20,.18);
}
html,body{height:100%;font-family:var(--fn);color:var(--g900);overflow:hidden;overscroll-behavior:none}
body{
  background:
    radial-gradient(1100px 520px at 12% -10%, #F0EBFF 0%, rgba(240,235,255,0) 60%),
    radial-gradient(900px 480px at 112% 6%, #FCEBD6 0%, rgba(252,235,214,0) 55%),
    radial-gradient(820px 600px at 50% 122%, #DFF2EA 0%, rgba(223,242,234,0) 60%),
    var(--g50);
}
/* hafif noktalı kâğıt dokusu */
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.45;
  background-image:radial-gradient(rgba(120,100,60,.06) 1.2px, transparent 1.3px);
  background-size:22px 22px;
}
/* Layout */
.app{display:flex;height:100vh;height:100dvh;position:relative;z-index:1}
.sidebar{width:var(--sw);min-width:var(--sw);height:100vh;height:100dvh;background:#fff;border-right:1px solid var(--g100);display:flex;flex-direction:column;transition:transform .3s cubic-bezier(.4,0,.2,1);z-index:100}
.main{flex:1;display:flex;flex-direction:column;min-width:0;height:100vh;height:100dvh}
/* Sidebar */
.sidebar-header{display:flex;align-items:center;justify-content:space-between;padding:18px 16px 14px;border-bottom:1px solid var(--g100);background:#fff}
.logo{display:flex;align-items:center;gap:9px}
.logo-icon{font-size:26px;filter:drop-shadow(0 2px 2px rgba(0,0,0,.12))}
.logo-text{font-family:var(--fd);font-size:19px;font-weight:800;color:var(--p600);letter-spacing:.2px}
.sidebar-close{display:none;background:var(--g50);border:none;font-size:15px;color:var(--g600);cursor:pointer;width:34px;height:34px;border-radius:50%;align-items:center;justify-content:center}
.sidebar-close:hover{background:var(--g100)}
.sidebar-nav{padding:14px 10px;flex:1;overflow-y:auto}
.nav-label{font-family:var(--fd);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--g400);padding:0 10px;margin-bottom:8px;margin-top:4px}
.nav-btn{display:flex;align-items:center;gap:11px;width:100%;padding:11px 12px;border:none;background:none;border-radius:var(--rmd);font-family:var(--fn);font-size:14.5px;font-weight:700;color:var(--g600);cursor:pointer;text-align:left;transition:background .14s,color .14s,transform .1s;margin-bottom:3px}
.nav-btn:hover{background:var(--g50);color:var(--g900)}
.nav-btn.active{background:var(--p50);color:var(--p600)}
.nav-btn.active .nav-icon{transform:scale(1.14)}
.nav-icon{font-size:18px;width:24px;text-align:center;transition:transform .14s}
.sidebar-footer{padding:14px 16px;border-top:1px solid var(--g100)}
.footer-note{font-size:11.5px;color:var(--g400);line-height:1.6;font-weight:600}
/* Overlay */
.overlay{display:none;position:fixed;inset:0;background:rgba(43,38,32,.42);-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px);z-index:90}
/* Topbar */
.topbar{height:56px;display:flex;align-items:center;gap:10px;padding:0 14px;background:rgba(255,255,255,.86);-webkit-backdrop-filter:saturate(140%) blur(8px);backdrop-filter:saturate(140%) blur(8px);border-bottom:1px solid var(--g100);flex-shrink:0;box-shadow:var(--sh-sm);position:relative;z-index:5}
.menu-btn{display:none;flex-direction:column;gap:5px;background:var(--g50);border:1px solid var(--g100);cursor:pointer;padding:9px;border-radius:12px}
.menu-btn span{display:block;width:20px;height:2.5px;background:var(--p600);border-radius:2px}
.topbar-title{flex:1;font-family:var(--fd);font-size:16px;font-weight:700;color:var(--g900)}
.clear-btn{background:var(--g50);border:1px solid var(--g100);font-size:16px;cursor:pointer;width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;opacity:.85;transition:opacity .15s,background .15s}
.clear-btn:hover{opacity:1;background:var(--coral-bg)}
/* Content area — switches between chat and game */
.content{flex:1;overflow:hidden;position:relative}
.panel{position:absolute;inset:0;display:flex;flex-direction:column;transition:opacity .2s}
.panel.hidden{opacity:0;pointer-events:none}
/* Chat */
.chat-area{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:22px 18px;display:flex;flex-direction:column;gap:12px}
.welcome{display:flex;flex-direction:column;align-items:center;text-align:center;padding:30px 16px 14px;gap:10px}
.welcome-avatar{font-size:60px;animation:bounceIn .55s ease;filter:drop-shadow(0 8px 10px rgba(83,74,183,.22))}
@keyframes bounceIn{0%{transform:scale(.5);opacity:0}70%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
.welcome-title{font-family:var(--fd);font-size:26px;font-weight:800;color:var(--p600);line-height:1.25}
.welcome-sub{font-size:14px;color:var(--g600);max-width:340px;line-height:1.6;font-weight:600}
.quick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:520px;margin-top:12px}
.qcard{position:relative;background:#fff;border:1px solid var(--g100);border-bottom-width:3px;border-radius:var(--rlg);padding:16px 10px;font-family:var(--fd);font-size:14px;font-weight:700;color:var(--g900);cursor:pointer;line-height:1.3;text-align:center;box-shadow:var(--sh-sm);transition:transform .12s,box-shadow .14s;animation:cardIn .4s both}
.qcard small{font-family:var(--fn);font-weight:600;color:var(--g400);font-size:11.5px;display:block;margin-top:3px}
.qcard:hover{transform:translateY(-3px);box-shadow:var(--sh-md)}
.qcard:nth-child(1){background:var(--grape-bg);border-color:#E0D8F6;border-bottom-color:var(--grape)}
.qcard:nth-child(2){background:var(--coral-bg);border-color:#F6D9CD;border-bottom-color:var(--coral);animation-delay:.05s}
.qcard:nth-child(3){background:var(--sky-bg);border-color:#CFE3F6;border-bottom-color:var(--sky);animation-delay:.1s}
.qcard:nth-child(4){background:var(--sun-bg);border-color:#F4E2BF;border-bottom-color:var(--sun);animation-delay:.15s}
.qcard:nth-child(5){background:var(--mint-bg);border-color:#C8E9DF;border-bottom-color:var(--mint);animation-delay:.2s}
.qcard:nth-child(6){background:var(--rose-bg);border-color:#F4D5E2;border-bottom-color:var(--rose);animation-delay:.25s}
@keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
/* Bubbles */
.bubble-wrap{display:flex;gap:9px;align-items:flex-start;animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.bubble-wrap.user{flex-direction:row-reverse}
.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;box-shadow:var(--sh-sm)}
.avatar.ai{background:var(--p50)}
.avatar.user-av{background:var(--t50)}
.bubble{max-width:76%;padding:11px 15px;border-radius:var(--rlg);font-size:15px;line-height:1.6;box-shadow:var(--sh-sm)}
.bubble.ai{background:#fff;color:var(--g900);border:1px solid var(--g100);border-top-left-radius:6px}
.bubble.user{background:var(--p600);color:#fff;border-top-right-radius:6px}
.bubble.loading{background:#fff;border:1px solid var(--g100)}
.typing-dots{display:inline-flex;gap:5px;align-items:center;height:18px}
.typing-dots span{width:7px;height:7px;border-radius:50%;background:var(--p400);animation:dot 1.1s infinite}
.typing-dots span:nth-child(2){animation-delay:.18s}
.typing-dots span:nth-child(3){animation-delay:.36s}
@keyframes dot{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-4px);opacity:1}}
.bubble strong{font-weight:800;color:inherit}
.bubble.ai strong{color:var(--p600)}
/* Input */
.input-area{padding:12px 16px 10px;background:rgba(255,255,255,.9);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);border-top:1px solid var(--g100);flex-shrink:0}
.input-wrap{display:flex;gap:8px;align-items:flex-end;background:var(--g50);border:1.5px solid var(--g100);border-radius:var(--rxl);padding:7px 7px 7px 16px;transition:border-color .15s,box-shadow .15s}
.input-wrap:focus-within{border-color:var(--p400);background:#fff;box-shadow:0 0 0 4px var(--p50)}
.input-wrap textarea{flex:1;border:none;background:none;font-family:var(--fn);font-size:16px;font-weight:600;color:var(--g900);resize:none;outline:none;line-height:1.5;min-height:24px;max-height:110px}
.input-wrap textarea::placeholder{color:var(--g400);font-weight:600}
.send-btn{width:46px;height:46px;border-radius:50%;background:var(--p600);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:background .12s,transform .12s,box-shadow .12s;color:#fff;box-shadow:0 4px 12px rgba(83,74,183,.34)}
.send-btn:hover{background:var(--p800)}
.send-btn:active{transform:scale(.9)}
.send-btn:disabled{opacity:.4;cursor:default;box-shadow:none}
.input-hint{font-size:11px;color:var(--g400);text-align:center;margin-top:6px;font-weight:600}
/* API Key setup */
.key-setup{background:#fff;border:1px solid var(--g100);border-radius:var(--rxl);padding:20px;margin:16px;text-align:center;box-shadow:var(--sh-md)}
.key-setup h2{font-family:var(--fd);font-size:16px;font-weight:700;color:var(--p600);margin-bottom:6px}
.key-setup p{font-size:13px;color:var(--g600);margin-bottom:12px;line-height:1.6;font-weight:600}
.key-row{display:flex;gap:7px}
.key-input{flex:1;padding:12px;border:1.5px solid var(--g100);border-radius:var(--rmd);font-family:var(--fn);font-size:16px;color:var(--g900);outline:none}
.key-input:focus{border-color:var(--p400)}
.key-btn{padding:10px 16px;background:var(--p600);color:#fff;border:none;border-radius:var(--rmd);font-family:var(--fd);font-size:14px;font-weight:700;cursor:pointer}
.key-btn:hover{background:var(--p800)}

/* ===== OYUNLAR ===== */
.game-panel{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:18px 16px;display:flex;flex-direction:column;gap:14px}
.game-header{text-align:center;padding:6px 0 2px}
.game-header h2{font-family:var(--fd);font-size:22px;font-weight:800;color:var(--p600)}
.game-header p{font-size:13px;color:var(--g600);margin-top:4px;font-weight:600}
.score-bar{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;background:#fff;border:1px solid var(--g100);border-radius:var(--rlg);padding:12px 14px;box-shadow:var(--sh-sm)}
.score-item{text-align:center;min-width:54px}
.score-num{font-family:var(--fd);font-size:24px;font-weight:800;color:var(--p600);line-height:1}
.score-lbl{font-size:10px;color:var(--g400);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
.game-card{background:#fff;border:1px solid var(--g100);border-radius:var(--rxl);padding:22px 18px;text-align:center;box-shadow:var(--sh-md)}
.game-question{font-size:17px;font-weight:700;color:var(--g900);margin-bottom:14px;line-height:1.5}
.game-word{font-family:var(--fd);font-size:40px;font-weight:800;color:var(--p600);margin-bottom:8px;letter-spacing:1px}
.game-hint{font-size:13px;color:var(--g400);margin-bottom:16px;font-weight:600}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px}
.opt-btn{padding:14px 10px;border:2px solid var(--g100);border-bottom-width:4px;border-radius:var(--rmd);background:#fff;font-family:var(--fd);font-size:15px;font-weight:700;color:var(--g900);cursor:pointer;transition:transform .12s,border-color .14s,background .14s;box-shadow:var(--sh-sm)}
.opt-btn:hover{border-color:var(--p400);background:var(--p50)}
.opt-btn.correct{border-color:var(--t400);background:var(--t50);color:var(--t800)}
.opt-btn.wrong{border-color:#D85A30;background:#FAECE7;color:#4A1B0C}
.opt-btn:disabled{cursor:default}
.feedback{font-family:var(--fd);font-size:16px;font-weight:700;padding:12px;border-radius:var(--rmd);margin-top:12px;text-align:center}
.feedback.ok{background:var(--t50);color:var(--t800)}
.feedback.no{background:#FAECE7;color:#4A1B0C}
.next-btn{padding:13px 26px;background:var(--p600);color:#fff;border:none;border-radius:var(--rmd);font-family:var(--fd);font-size:15px;font-weight:700;cursor:pointer;margin-top:12px;transition:background .12s,transform .12s;box-shadow:0 4px 12px rgba(83,74,183,.3)}
.next-btn:hover{background:var(--p800)}
.game-select{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:2px}
.gsel-btn{background:#fff;border:1px solid var(--g100);border-bottom-width:4px;border-radius:var(--rxl);padding:22px 14px;text-align:center;cursor:pointer;font-family:var(--fd);transition:transform .12s,box-shadow .14s;box-shadow:var(--sh-sm)}
.gsel-btn:hover{transform:translateY(-3px);box-shadow:var(--sh-md)}
.gsel-icon{font-size:38px;margin-bottom:8px}
.gsel-name{font-size:15.5px;font-weight:800;color:var(--g900)}
.gsel-desc{font-family:var(--fn);font-size:12px;color:var(--g400);margin-top:4px;line-height:1.4;font-weight:600}
.gsel-btn:nth-child(1){background:var(--sky-bg);border-bottom-color:var(--sky)}
.gsel-btn:nth-child(2){background:var(--coral-bg);border-bottom-color:var(--coral)}
.gsel-btn:nth-child(3){background:var(--mint-bg);border-bottom-color:var(--mint)}
.gsel-btn:nth-child(4){background:var(--sun-bg);border-bottom-color:var(--sun)}
/* Hece sürükleme oyunu */
.hece-word{font-family:var(--fd);font-size:30px;font-weight:800;color:var(--p600);margin-bottom:6px}
.hece-parts{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:10px 0}
.hece-chip{padding:9px 17px;border:2px solid var(--p100);border-radius:30px;font-size:16px;font-weight:700;background:var(--p50);color:var(--p600);cursor:pointer;transition:all .15s}
.hece-chip:hover{border-color:var(--p400);transform:scale(1.05)}
.hece-chip.selected{border-color:var(--p600);background:var(--p100)}
.hece-answer{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;min-height:46px;padding:8px;border:2px dashed var(--g200);border-radius:var(--rmd);margin:8px 0;background:var(--g50)}
.hece-answer .hece-chip{cursor:pointer}
/* Sesli bul oyunu */
.letter-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:10px 0}
.letter-tile{width:50px;height:50px;border:2px solid var(--g100);border-radius:var(--rmd);font-family:var(--fd);font-size:20px;font-weight:800;display:flex;align-items:center;justify-content:center;cursor:pointer;background:#fff;transition:all .15s;color:var(--g900)}
.letter-tile:hover{border-color:var(--p400);background:var(--p50)}
.letter-tile.picked.correct{border-color:var(--t400);background:var(--t50);color:var(--t800)}
.letter-tile.picked.wrong{border-color:#D85A30;background:#FAECE7;color:#4A1B0C}
/* Kelime tamamla */
.blank-word{font-family:var(--fd);font-size:34px;font-weight:800;color:var(--p600);letter-spacing:4px;margin:12px 0}
.blank-input{font-family:var(--fd);font-size:24px;font-weight:700;width:66px;text-align:center;border:none;border-bottom:3px solid var(--p400);background:none;outline:none;color:var(--p600)}
/* Scrollbar */
.chat-area::-webkit-scrollbar,.game-panel::-webkit-scrollbar{width:6px}
.chat-area::-webkit-scrollbar-thumb,.game-panel::-webkit-scrollbar-thumb{background:var(--g200);border-radius:10px}

/* ===== MOBİL & DOKUNMATİK İYİLEŞTİRMELER ===== */
/* Çentik / güvenli alan (iPhone notch & alt çubuk) */
.topbar{height:auto;min-height:56px;padding-top:max(0px,env(safe-area-inset-top))}
.sidebar-header{padding-top:calc(18px + env(safe-area-inset-top))}
.input-area{padding-bottom:calc(10px + env(safe-area-inset-bottom))}
.sidebar{padding-bottom:env(safe-area-inset-bottom)}
/* Uzun kelime/cevaplar taşmasın */
.bubble{overflow-wrap:anywhere;word-break:break-word}
.game-word,.hece-word,.blank-word,.game-question{overflow-wrap:anywhere;max-width:100%}
/* Dokunmatik geri bildirim (basınca küçülme) */
.nav-btn:active,.qcard:active,.opt-btn:active,.gsel-btn:active,.next-btn:active,.hece-chip:active,.letter-tile:active,.key-btn:active{transform:scale(.96)}
/* Dokunmatik cihazda hover yapışmasını önle */
@media (hover:none){
  .qcard:hover,.gsel-btn:hover,.opt-btn:hover{transform:none}
}
/* Klavyeyle gezinince net odak çerçevesi (erişilebilirlik) */
:focus-visible{outline:3px solid var(--p400);outline-offset:2px}
button:focus:not(:focus-visible){outline:none}

/* Responsive — tablet & telefon */
@media(max-width:680px){
  .sidebar{position:fixed;top:0;left:0;width:min(86vw,320px);min-width:0;transform:translateX(-100%);border-right:none;border-radius:0 22px 22px 0;box-shadow:var(--sh-lg)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-close{display:flex}
  .overlay.show{display:block}
  .menu-btn{display:flex}
  .quick-grid{grid-template-columns:repeat(2,1fr)}
  .bubble{max-width:86%}
}

/* Telefon: büyük dokunma hedefleri + okunabilir yazı */
@media (max-width:680px){
  .topbar{min-height:60px;gap:8px}
  .menu-btn{padding:10px;margin-left:-2px}
  .menu-btn span{width:22px}
  .topbar-title{font-size:17px}
  .clear-btn{width:42px;height:42px;font-size:18px}
  .nav-btn{padding:14px 13px;font-size:16px}
  .nav-icon{font-size:20px}
  .chat-area{padding:18px 14px}
  .welcome{padding:22px 14px 12px}
  .welcome-avatar{font-size:64px}
  .welcome-title{font-size:27px}
  .welcome-sub{font-size:15px}
  .qcard{padding:18px 10px;font-size:15px;min-height:84px;display:flex;flex-direction:column;justify-content:center}
  .qcard small{font-size:12.5px}
  .bubble{font-size:16px;max-width:88%}
  .avatar{width:36px;height:36px;font-size:18px}
  .input-area{padding-top:12px;padding-left:12px;padding-right:12px}
  .input-wrap{padding:8px 8px 8px 16px}
  .input-hint{font-size:11.5px}
  /* Oyunlar */
  .game-panel{padding:16px 13px}
  .game-card{padding:20px 16px}
  .game-word{font-size:42px}
  .opt-btn{padding:17px 10px;font-size:16.5px;min-height:60px}
  .gsel-btn{padding:22px 12px;min-height:128px;display:flex;flex-direction:column;justify-content:center}
  .gsel-icon{font-size:42px}
  .gsel-name{font-size:16px}
  .gsel-desc{font-size:12.5px}

<script>
// ===== CONFIG =====
const SYSTEM_PROMPT = `Sen 1. ve 2. sınıf ilkokul öğrencilerine yönelik Türkçe okuma-yazma asistanısın.
KAPSAM (ÇOK ÖNEMLİ): Yalnızca Türkçe okuma-yazma konularında yardım edersin: harfler, sesler, alfabe, heceleme, kelimeler, cümleler, imla/yazım, noktalama, okuma ve yazma. Bu konuların DIŞINDAKİ hiçbir soruyu (spor, maç, oyun, bilim, coğrafya, genel kültür, güncel olaylar vb.) cevaplama, bilgi verme veya tahmin yürütme. Konu dışı bir soru gelirse SADECE şunu söyle: "Ben okuma-yazma asistanıyım 😊 Sana harfler, heceler, kelimeler ve yazım konularında yardımcı olabilirim!"
Yanıtların TDK (Türk Dil Kurumu) kurallarına TAM uymalı; asla sapma. Emin olmadığın kelimeyi kullanma, basit ve doğru bir örnek seç.
ÜSLUP: Çok kısa, sade, sevecen. En fazla 3-4 cümle. Bol örnek, az teori. Çocuğu cesaretlendir. Karmaşık terim ve olumsuz dil yok.

HARFLER:
Ünlü (sesli): a e ı i o ö u ü (8 tane).
Ünsüz (sessiz): b c ç d f g ğ h j k l m n p r s ş t v y z (21 tane).

HECELEME — TDK kuralları (çok dikkatli uygula):
1) Her hecede MUTLAKA bir ünlü vardır. Hece sayısı = ünlü sayısı. Örnek: top=1, el-ma=2, ke-le-bek=3.
2) İki ünlü arasındaki tek ünsüz, sonraki heceye bağlanır: a-ra-ba, ka-pı, ma-sa, o-kul, a-rı.
3) Yan yana iki ünsüz: ilki önceki heceye, ikincisi sonraki heceye: el-ma, kar-tal, çan-ta, as-lan, bir-lik.

5) ÇOK ÖNEMLİ: Heceleri birleştirince kelime AYNEN çıkmalı. Harf EKLEME, ÇIKARMA, DEĞİŞTİRME.
   Doğru: elma → el-ma.  YANLIŞ: el-ma-sa (fazladan "sa" eklenemez).
Doğru örnekler: a-rı, ki-tap, ka-lem, çi-çek, bu-lut, li-mon, kar-puz, ta-vuk, se-pet.

İMLA / NOKTALAMA:

Nokta: cümle sonu. Virgül: sıralama. Soru işareti: soru sonu. Ünlem: heyecan/seslenme.

TÜRKÇE YAZIM (ÇOK DİKKAT):
Türkçe karakterleri doğru kullan; i/ı, o/ö, u/ü, c/ç, g/ğ, s/ş AYRI harflerdir, karıştırma.
"i" noktalıdır, "ı" noktasızdır. Özel isimleri her zaman doğru yaz: Ali (Alı DEĞİL!), Ayşe, İzmir, Türkiye.
Kelimeleri her zaman doğru yaz; yanlış yazılmış veya uydurma kelime verme. Emin değilsen o kelimeyi hiç kullanma.

ÖRNEK DOĞRU CEVAPLAR (bu üslup ve bu doğrulukla yanıtla):
S: Sesli harfler nelerdir? → C: Sesli harfler: a, e, ı, i, o, ö, u, ü. Toplam 8 tane! 😊
S: Büyük harf ne zaman kullanılır? → C: İki yerde: 1) Cümle başında (Ali okula gitti.) 2) Özel isimlerde (Ali, İzmir, Türkiye). 👍
S: kitap kelimesini hecele → C: ki-tap, 2 hece. 😊
S: ğ harfi sesli mi? → C: Hayır, "ğ" sessiz harftir. 😊`;

const TOPIC_EXTRA = {

  imla:'📝 İmla', noktalama:'❓ Noktalama', dikte:'✏️ Dikte',

// ===== STATE =====

  {w:'kitap',h:['ki','tap']},{w:'okul',h:['o','kul']},{w:'elma',h:['el','ma']},
  {w:'kapı',h:['ka','pı']},{w:'kalem',h:['ka','lem']},{w:'çiçek',h:['çi','çek']},

// ===== DOM =====
const chatArea=document.getElementById('chatArea');

// ===== DETERMİNİSTİK TDK CEVAPLARI (model gerektirmez, her zaman doğru) =====
const V_SET=new Set([...'aeıioöuüAEIİOÖUÜ']);
function trLower(s){
  return s.replace(/İ/g,'i').replace(/I/g,'ı').replace(/Ş/g,'ş').replace(/Ğ/g,'ğ')
          .replace(/Ü/g,'ü').replace(/Ö/g,'ö').replace(/Ç/g,'ç').toLowerCase();
}
function trUpper(ch){ return ch==='i'?'İ':ch==='ı'?'I':ch.toUpperCase(); }
// Aksan-duyarsız eşleştirme için ASCII'ye indir (1:1 — uzunluğu korur, indeksler hizalı kalır).
// Çocuklar sık sık Türkçe karakter yazmaz: "kac harf", "buyuk", "unlu", "virgul", "ozel" ...
function fold(s){ return s.replace(/ç/g,'c').replace(/ğ/g,'g').replace(/ı/g,'i').replace(/ö/g,'o').replace(/ş/g,'s').replace(/ü/g,'u'); }

// TDK heceleme: her kelimeyi kurala göre böler (iki sesli arası tek sessiz sonrakine; iki sessiz bölünür)
function heceBol(w){
  w=(w||'').trim();
  const vi=[];
  for(let i=0;i<w.length;i++) if(V_SET.has(w[i])) vi.push(i);
  if(vi.length<=1) return [w];
  const cuts=[];
  for(let k=0;k<vi.length-1;k++){
    const a=vi[k], b=vi[k+1], between=b-a-1;
    cuts.push(between===0 ? a+1 : b-1);
  }
  const parts=[]; let start=0;
  for(const c of cuts){ parts.push(w.slice(start,c)); start=c; }
  parts.push(w.slice(start));
  return parts;
}

// Hazır soru bankasında (window.OW_FAQ) ara — TAM kelime + niyet eşleşmesi (aksan-duyarsız)
let _ffaq=null; // bankanın foldlanmış (ASCII) indeksi — ilk çağrıda bir kez kurulur
function faqLookup(t){
  if(!window.OW_FAQ) return null;
  if(!_ffaq) _ffaq=window.OW_FAQ.map(e=>({
    a:e.a,
    w:e.w||null,                      // hedef kelime: TAM (Türkçe) eşleşir — yazım hatası tespiti korunur (proğram≠program)
    k:e.k?e.k.map(fold):null,         // niyet anahtarları: foldlu (aksan-duyarsız)
    kany:e.kany?e.kany.map(fold):null,
    sc:(e.w?e.w.length:0)+(e.k?e.k.map(fold).join('').length:0)
  }));
  const normT=' '+t.replace(/[^a-zçğıiöşü]+/g,' ').trim()+' ';   // Türkçe korunur (w için)
  const normF=' '+fold(t).replace(/[^a-z]+/g,' ').trim()+' ';     // foldlu (k/kany için)
  let best=null,score=-1;
  for(const e of _ffaq){
    if(e.w && !normT.includes(' '+e.w+' ')) continue;          // hedef kelime tam eşleşmeli (Türkçe)
    if(e.k && !e.k.every(kw=>normF.includes(kw))) continue;    // tüm niyet anahtarları (foldlu)
    if(e.kany && !e.kany.some(kw=>normF.includes(kw))) continue;// en az bir niyet (foldlu)
    if(!e.w && !e.k && !e.kany) continue;
    if(e.sc>score){best=e;score=e.sc;}
  }
  return best?best.a:null;
}

// "WORD kaç harf / ilk-son harf / kaç sesli-sessiz" gibi kelime sorularında hedef kelime
// NOT: 'şu' BİLEREK yok — foldlanınca 'su' olur ve gerçek "su" kelimesini engellerdi.
const WSTOP=new Set(['kaç','hece','kelime','kelimede','kelimesinde','kelimesinin','kelimenin','bu','bir','ilk','son','sesli','sessiz','harf','harfi','var','kaçtane','alfabe','alfabede','alfabenin','türkçe','türkçede','türkçenin','cümle','cümlede','sözcük']);
const WSTOPf=new Set([...WSTOP].map(fold)); // foldlanmış hâli (aksan-duyarsız kontrol için)

// Okuma-yazma konu anahtarları — bir mesajda bunlardan hiçbiri geçmiyorsa soru KONU DIŞI sayılır
const TOPIC_WORDS=['harf','ses','ünlü','ünsüz','alfabe','hece','kelime','sözcük','cümle','imla','yazım','yaz','oku','dikte','nokta','virgül','noktalama','ünlem','vurgu','satır','şiir','tekerleme','metin','paragraf','türkçe'];
// Soru okuma-yazmayla ilgili mi? (yerel hızlı kapı)
function onTopic(text){
  const t=fold(trLower(text||''));
  return TOPIC_WORDS.some(w=>t.includes(fold(w)));
}

// Kullanıcı mesajına TDK-kesin cevap döndürür; yoksa null (o zaman modele sorulur)
// Niyet eşleştirmesi foldlu metin (tf) üzerinde yapılır → "kac harf", "buyuk", "unlu" gibi
// Türkçe karakter içermeyen çocuk yazımları da yakalanır. Kelime orijinal hâliyle (t) gösterilir.
function localAnswer(text){
  const t=trLower(text).replace(/['’ʼ]/g,''); // kesme işaretini kaldır: "araba'nın" → "arabanın"
  const tf=fold(t);

  // Tek harf: "X (harfi) sesli/sessiz mi" veya "X harfi nedir" → harfi sınıflandır.
  // tf (foldlu) ile yakala ("unlu/unsuz" da olur); harfi t'den indeksle al (ç/ı kimliği korunur).
  const lm=tf.match(/(?:^|[\s"'(])([a-z])\s*(?:harfi?\s*)?(?:sesli|unlu|sessiz|unsuz)\s*m[iu]/d)
          ||tf.match(/(?:^|[\s"'(])([a-z])\s*harfi?\s*(?:ne|nedir)/d);
  if(lm){
    const [s,e]=lm.indices[1], h=t.slice(s,e);
    if(SESLI.includes(h)) return `**${trUpper(h)}** harfi **sesli (ünlü)** harftir. 😊`;
    if(SESSIZ.includes(h)) return `**${trUpper(h)}** harfi **sessiz (ünsüz)** harftir. 😊`;
  }

  // Kelimeye özgü KESİN hesaplamalar — bankadan ÖNCE (genel banka cevabına takılmasın).
  // tf (foldlu) ile yakala; kelimeyi t'den (orijinal) indeksle al (fold uzunluğu korur → hizalı).
  const wq=re=>{const m=tf.match(re); if(!m)return null; const [s,e]=m.indices[1]; const w=t.slice(s,e), fw=fold(w); return (WSTOPf.has(fw)||/^(alfabe|turkce|kelime|sozcuk|cumle)/.test(fw))?null:w;};
  let w;
  if((w=wq(/([a-z]{2,})\s+(?:kelimesin(?:in|de)\s+)?ilk harf/d)))
    return `**${w}** kelimesinin ilk harfi **${trUpper(w[0])}** harfidir. 😊`;
  if((w=wq(/([a-z]{2,})\s+(?:kelimesin(?:in|de)\s+)?son harf/d)))
    return `**${w}** kelimesinin son harfi **${trUpper(w.slice(-1))}** harfidir. 😊`;
  if((w=wq(/([a-z]{2,})\s+(?:kelimesinde\s+)?kac\s*sessiz/d))){
    const n=[...w].filter(c=>SESSIZ.includes(c)).length;
    return `**${w}** kelimesinde **${n}** sessiz harf vardır. 😊`;
  }
  if((w=wq(/([a-z]{2,})\s+(?:kelimesinde\s+)?kac\s*sesli/d))){
    const n=[...w].filter(c=>SESLI.includes(c)).length;
    return `**${w}** kelimesinde **${n}** sesli harf vardır. 😊`;
  }
  if((w=wq(/([a-z]{1,})\s+(?:kelimesinde\s+)?kac\s*harf/d)))
    return `**${w}** kelimesinde **${w.length}** harf vardır. 😊`;

  // Sesli / sessiz harf listesi (genel) — "harf" geçmeli; ünlü/ünsüz eşanlamlarını da kapsar
  const wantsSesli=/(sesli|unlu)/.test(tf)&&/harf/.test(tf);
  const wantsSessiz=/(sessiz|unsuz)/.test(tf)&&/harf/.test(tf);
  if(wantsSesli&&wantsSessiz) return `Sesli (ünlü) harfler: ${SESLI.join(', ')} → **8** tane.\nSessiz (ünsüz) harfler: ${SESSIZ.join(', ')} → **21** tane. 😊`;
  if(wantsSesli) return `Sesli (ünlü) harfler: ${SESLI.join(', ')}. Toplam **8** tane! 😊`;
  if(wantsSessiz) return `Sessiz (ünsüz) harfler: ${SESSIZ.join(', ')}. Toplam **21** tane! 😊`;

  // Hazır soru bankası (kavramsal/kural sorular)
  const fq=faqLookup(t);
  if(fq!==null) return fq;

  // Heceleme (foldlu yakala, orijinal kelimeyi t'den al)
  if(/hece/.test(tf)){
    const m=tf.match(/([a-z]{2,})\s+(?:kelimesini\s+|kelimesi\s+)?hecele/d)
          ||tf.match(/hecele\s+(?:bana\s+|su\s+)?([a-z]{2,})/d)
          ||tf.match(/([a-z]{2,})\s+(?:kelimesi\s+)?kac\s*hece/d);
    const skip=new Set(['kelime','kelimesini','kelimesi','bana','su','bir','lutfen']);
    if(m){
      const [s,e]=m.indices[1], word=t.slice(s,e), fw=fold(word);
      if(!skip.has(fw)&&!/^(hece|bol|ayir)/.test(fw)){
        const parts=heceBol(word);
        if(/kac\s*hece/.test(tf)) return `**${word}** kelimesinde **${parts.length}** hece var: ${parts.join('-')} 😊`;
        return `**${word}** → ${parts.join(' - ')} (${parts.length} hece) 😊`;
      }
    }
    return 'Hece bölme kuralı: Her hecede **bir sesli harf** vardır. İki sesli arasındaki tek sessiz sonraki heceye gider (a-ra-ba); iki sessiz yan yana ise bölünür (el-ma, kar-tal). Örnek: top (1), el-ma (2), ke-le-bek (3). 😊';
  }

  // Alfabe / kaç harf (yalnızca SAYIM; "alfabe" tek başına değil → "alfabenin 5. harfi" modele gitsin)
  if(/kac harf|harf var|harf sayisi/.test(tf))
    return `Türk alfabesinde **29** harf vardır: **8** sesli (${SESLI.join(', ')}) ve **21** sessiz harf. 😊`;

  // Büyük harf
  if(/buyuk harf/.test(tf))
    return `Büyük harf iki yerde kullanılır:\n1) **Cümle başında**: Ali okula gitti.\n2) **Özel isimlerde**: Ali, Ayşe, İzmir, Türkiye. 👍`;

  // Noktalama
  if(/nokta/.test(tf)&&!/noktalama/.test(tf))
    return `**Nokta (.)** cümlenin sonuna konur. Örnek: Bugün hava çok güzel. 😊`;
  if(/virgul/.test(tf))
    return `**Virgül (,)** sıralanan kelimeleri birbirinden ayırır. Örnek: Elma, armut ve muz aldım. 😊`;
  if(/soru isaret/.test(tf))
    return `**Soru işareti (?)** soru cümlesinin sonuna konur. Örnek: Adın ne? 😊`;
  if(/unlem/.test(tf))
    return `**Ünlem işareti (!)** sevinç, heyecan veya seslenme bildirir. Örnek: Yaşasın! 😊`;
  if(/noktalama/.test(tf))
    return `Noktalama işaretleri:\n• **Nokta (.)** → cümle sonu\n• **Virgül (,)** → sıralama\n• **Soru işareti (?)** → soru sonu\n• **Ünlem (!)** → heyecan/seslenme 😊`;

  // İmla (genel)
  if(/imla|yazim kural/.test(tf))
    return `Önemli imla kuralları:\n• Cümle **büyük harfle** başlar, **nokta** ile biter.\n• Özel isimler büyük harfle yazılır: Ali, Ankara.\n• "de/da" bağlacı ayrı yazılır: "Ali de geldi." 😊`;

  // Dikte kelimeleri
  if(/dikte/.test(tf)){
    const havuz=['el','su','araba','kalem','okul','elma','kapı','masa','çanta','limon','balık','kitap','bulut','tavuk','sepet','yıldız','çiçek','top','defter','silgi'];
    const sec=[...havuz].sort(()=>Math.random()-.5).slice(0,10);
    return `İşte sana dikte kelimeleri:\n**${sec.join(', ')}.**\nBirini seçip hecelemeyi de deneyebilirsin! 😊`;
  }

  return null; // deterministik cevap yok → modele sor
}

function saveKey(){

  API_KEY=v;localStorage.setItem('owApiKey',v);
  document.getElementById('keySetup')?.remove();
}

async function sendMessage(){
  const text=userInput.value.trim();
  if(!text||isLoading) return;
  userInput.value='';userInput.style.height='auto';
  await chat(text);
}

window.sendQuick=async function(text){
  if(isLoading) return;
  await chat(text);
};

// Gemini'ye düşen (bankada olmayan) soru-cevabı denetim için sunucuya kaydet
function logQA(q,a){
  try{
    fetch('/log',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({q,a,topic:currentTopic,model:'gemini-2.5-flash-lite'})}).catch(()=>{});
  }catch(e){}
}

async function chat(userText){
  chatArea.querySelector('.welcome')?.remove();
  document.getElementById('keySetup')?.remove();
  appendBubble(userText,'user');
  messages.push({role:'user',content:userText});
  // 1) Deterministik TDK cevabı — model gerektirmez, her zaman doğru (API'siz de çalışır)
  const local=localAnswer(userText);
  if(local!==null){
    appendBubble(local,'ai');
    messages.push({role:'assistant',content:local});
    return;
  }
  // 1.5) Konu dışı soru → okuma-yazma dışındaki hiçbir soruya cevap verme (yerel hızlı kapı, API'ye gitmez)
  if(!onTopic(userText)){
    const redirect='Ben okuma-yazma asistanıyım 😊 Sana harfler, heceler, kelimeler, cümleler ve yazım konularında yardımcı olabilirim. Bunlardan birini sormak ister misin?';
    appendBubble(redirect,'ai');
    messages.push({role:'assistant',content:redirect});
    return;
  }
  // 2) Serbest soru → model gerekir
  isLoading=true;sendBtn.disabled=true;
  const loadEl=appendLoading();
  try{
    const extra=TOPIC_EXTRA[currentTopic]||'';
    const sys=SYSTEM_PROMPT+(extra?'\n'+extra:'');
    // Sohbet geçmişini Gemini formatına çevir (assistant -> model, parts)
    const contents=messages.map(m=>({
      role:m.role==='assistant'?'model':'user',
      parts:[{text:m.content}]
    }));
    const body=JSON.stringify({
      system_instruction:{parts:[{text:sys}]},
      contents,
      generationConfig:{maxOutputTokens:400,temperature:0.2,thinkingConfig:{thinkingBudget:0}} // düşük sıcaklık + düşünme kapalı = en ucuz
    });
    // Yerelde config.js anahtarı varsa doğrudan Gemini; yoksa (canlıda) sunucu tarafı proxy
    const res = API_KEY
      ? await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key='+encodeURIComponent(API_KEY),{method:'POST',headers:{'Content-Type':'application/json'},body})
      : await fetch('/api/gemini',{method:'POST',headers:{'Content-Type':'application/json'},body});
    const data=await res.json();
    if(!res.ok) throw new Error(data.error?.message||'Hata');
    const reply=data.candidates?.[0]?.content?.parts?.map(p=>p.text).join('')||'Bir sorun çıktı 😊';
    loadEl.remove();
    appendBubble(reply,'ai');
    messages.push({role:'assistant',content:reply});
    logQA(userText,reply); // denetim için kaydet (yalnızca model cevapları)
  }catch(err){
    loadEl.remove();
    appendBubble('Şu an cevap veremedim, birazdan tekrar dener misin? 😊','ai');
    console.error(err);
  }
  isLoading=false;sendBtn.disabled=false;userInput.focus();
}

function appendBubble(text,type){
  const wrap=document.createElement('div');
  wrap.className='bubble-wrap'+(type==='user'?' user':'');
  const av=document.createElement('div');
  av.className='avatar '+(type==='user'?'user-av':'ai');
  av.textContent=type==='user'?'🧒':'📚';
  const bub=document.createElement('div');
  bub.className='bubble '+type;
  bub.innerHTML=fmt(text);
  if(type==='user'){wrap.appendChild(bub);wrap.appendChild(av);}
  else{wrap.appendChild(av);wrap.appendChild(bub);}
  chatArea.appendChild(wrap);
  chatArea.scrollTop=chatArea.scrollHeight;
  return wrap;
}

function appendLoading(){
  const wrap=document.createElement('div');
  wrap.className='bubble-wrap';
  const av=document.createElement('div');av.className='avatar ai';av.textContent='📚';
  const bub=document.createElement('div');bub.className='bubble ai loading';
  bub.innerHTML='<div class="typing-dots"><span></span><span></span><span></span></div>';
  wrap.appendChild(av);wrap.appendChild(bub);
  chatArea.appendChild(wrap);chatArea.scrollTop=chatArea.scrollHeight;
  return wrap;
}

function fmt(t){
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/\n/g,'<br>');
}

// ===== OYUNLAR =====
function showGameSelect(){
  currentGame=null;gameScore={correct:0,total:0};
  gameArea.innerHTML=`
  <div class="game-header"><h2>🎮 Oyunlar</h2><p>Hangi oyunu oynamak istersin?</p></div>
  <div class="game-select">
    <button class="gsel-btn" onclick="startGame('hece')">
      <div class="gsel-icon">✂️</div>
      <div class="gsel-name">Hece Bul</div>
      <div class="gsel-desc">Kelimelerin hecelerini bul</div>
    </button>
    <button class="gsel-btn" onclick="startGame('sesli')">
      <div class="gsel-icon">🔊</div>
      <div class="gsel-name">Sesli mi Sessiz mi?</div>
      <div class="gsel-desc">Harfi doğru sınıfla</div>
    </button>
    <button class="gsel-btn" onclick="startGame('kelime')">
      <div class="gsel-icon">🔤</div>
      <div class="gsel-name">Kelimeyi Tamamla</div>
      <div class="gsel-desc">Eksik harfi bul</div>
    </button>
    <button class="gsel-btn" onclick="startGame('hecesat')">
      <div class="gsel-icon">🔢</div>

      <div class="gsel-desc">Kaç hece var?</div>
    </button>
  </div>`;
}

window.startGame=function(type){
  currentGame=type;gameScore={correct:0,total:0};
  if(type==='hece') nextHece();
  else if(type==='sesli') nextSesli();
  else if(type==='kelime') nextKelime();
  else if(type==='hecesat') nextHeceSat();
};

// --- OYUN 1: Hece Bul (seçenekli) ---
function nextHece(){
  const item=rand(WORDS);
  const correct=item.h.join('-');
  // 3 yanlış seçenek üret
  let wrongs=[];
  while(wrongs.length<3){
    const w=rand(WORDS);
    const opt=w.h.join('-');
    if(opt!==correct&&!wrongs.includes(opt)) wrongs.push(opt);
  }
  const opts=shuffle([correct,...wrongs]);
  gameArea.innerHTML=`
  <div class="game-header"><h2>✂️ Hece Bul</h2><p>Bu kelimenin doğru hece bölümünü seç</p></div>
  ${scoreBar()}
  <div class="game-card">
    <div class="game-word">${item.w}</div>
    <div class="game-hint">Doğru hece bölümünü seç!</div>
    <div class="options-grid" id="opts">
      ${opts.map(o=>`<button class="opt-btn" onclick="checkHece(this,'${o}','${correct}')">${o}</button>`).join('')}
    </div>
    <div id="fb"></div>
  </div>`;
}

window.checkHece=function(btn,chosen,correct){
  document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
  const ok=chosen===correct;
  btn.classList.add(ok?'correct':'wrong');
  if(!ok) document.querySelectorAll('.opt-btn').forEach(b=>{if(b.textContent===correct)b.classList.add('correct');});
  gameScore.total++;if(ok)gameScore.correct++;
  document.getElementById('fb').innerHTML=`
  <div class="feedback ${ok?'ok':'no'}">${ok?'✅ Harika! Doğru!':'❌ Olmadı. Doğrusu: '+correct}</div>
  <button class="next-btn" onclick="nextHece()">Devam Et →</button>`;
};

// --- OYUN 2: Sesli mi Sessiz mi? ---
function nextSesli(){
  const isSesli=Math.random()>0.5;
  const letter=isSesli?rand(SESLI):rand(SESSIZ);
  gameState={letter,isSesli};
  gameArea.innerHTML=`
  <div class="game-header"><h2>🔊 Sesli mi Sessiz mi?</h2><p>Bu harf sesli mi yoksa sessiz mi?</p></div>
  ${scoreBar()}
  <div class="game-card">
    <div class="game-word" style="font-size:56px">${letter.toUpperCase()}</div>
    <div class="game-hint">Bu harf sesli mi, sessiz mi?</div>
    <div class="options-grid">
      <button class="opt-btn" onclick="checkSesli(true)">🔊 Sesli</button>
      <button class="opt-btn" onclick="checkSesli(false)">🔇 Sessiz</button>
    </div>
    <div id="fb"></div>
  </div>`;
}

window.checkSesli=function(chosen){
  document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
  const ok=chosen===gameState.isSesli;
  const btns=document.querySelectorAll('.opt-btn');
  if(gameState.isSesli){btns[0].classList.add('correct');if(!ok)btns[1].classList.add('wrong');}
  else{btns[1].classList.add('correct');if(!ok)btns[0].classList.add('wrong');}
  gameScore.total++;if(ok)gameScore.correct++;
  const sesliList='a, e, ı, i, o, ö, u, ü';
  document.getElementById('fb').innerHTML=`
  <div class="feedback ${ok?'ok':'no'}">${ok?'✅ Doğru! Aferin!':'❌ Yanlış! '+gameState.letter.toUpperCase()+' harfi '+(gameState.isSesli?'seslidir 🔊':'sessizdir 🔇')}</div>
  <div style="font-size:12px;color:var(--g400);margin:6px 0">Sesli harfler: ${sesliList}</div>
  <button class="next-btn" onclick="nextSesli()">Devam Et →</button>`;
};

// --- OYUN 3: Kelimeyi Tamamla ---
function nextKelime(){
  const item=rand(BLANK_WORDS);
  gameState={answer:item.answer};
  const display=item.display.replace('_','<span style="color:var(--p400)">_</span>');
  gameArea.innerHTML=`
  <div class="game-header"><h2>🔤 Kelimeyi Tamamla</h2><p>Eksik harfi bul!</p></div>
  ${scoreBar()}
  <div class="game-card">
    <div class="game-hint">İpucu: ${item.hint}</div>
    <div class="blank-word">${display}</div>
    <div style="margin:10px 0">
      <input class="blank-input" id="blankInput" maxlength="1" placeholder="?" autofocus/>
    </div>
    <button class="next-btn" onclick="checkKelime()">Kontrol Et ✓</button>
    <div id="fb"></div>
  </div>`;
  document.getElementById('blankInput').addEventListener('keydown',e=>{if(e.key==='Enter')checkKelime();});
}

window.checkKelime=function(){
  const val=document.getElementById('blankInput').value.trim().toLowerCase();
  if(!val) return;
  const ok=val===gameState.answer;
  gameScore.total++;if(ok)gameScore.correct++;
  document.getElementById('blankInput').disabled=true;
  document.querySelector('.next-btn').disabled=true;
  document.getElementById('fb').innerHTML=`
  <div class="feedback ${ok?'ok':'no'}" style="margin-top:10px">${ok?'✅ Süpersin! Doğru harf: "'+gameState.answer+'"':'❌ Değil! Doğru harf: "'+gameState.answer+'"'}</div>
  <button class="next-btn" onclick="nextKelime()">Devam Et →</button>`;
};

// --- OYUN 4: Hece Sayısı ---
function nextHeceSat(){
  const item=rand(WORDS);
  const correct=item.h.length;
  const opts=shuffle([...new Set([1,2,3,correct])].slice(0,4));
  gameArea.innerHTML=`
  <div class="game-header"><h2>🔢 Hece Sayısı</h2><p>Bu kelimede kaç hece var?</p></div>
  ${scoreBar()}
  <div class="game-card">
    <div class="game-word">${item.w}</div>
    <div class="game-hint">Kaç hece sayıyorsun?</div>
    <div class="options-grid" id="opts">
      ${opts.map(n=>`<button class="opt-btn" onclick="checkHeceSat(this,${n},${correct})">${n} hece</button>`).join('')}
    </div>
    <div id="fb"></div>
  </div>`;
}

window.checkHeceSat=function(btn,chosen,correct){
  document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
  const ok=chosen===correct;
  btn.classList.add(ok?'correct':'wrong');
  if(!ok) document.querySelectorAll('.opt-btn').forEach(b=>{if(b.textContent===correct+' hece')b.classList.add('correct');});
  gameScore.total++;if(ok)gameScore.correct++;
  document.getElementById('fb').innerHTML=`
  <div class="feedback ${ok?'ok':'no'}">${ok?'✅ Doğru! '+correct+' hece!':'❌ Yanlış! Doğrusu '+correct+' hece.'}</div>
  <button class="next-btn" onclick="nextHeceSat()">Devam Et →</button>`;
};

function scoreBar(){
  return `<div class="score-bar">
    <div class="score-item"><div class="score-num" style="color:var(--t400)">${gameScore.correct}</div><div class="score-lbl">Doğru</div></div>
    <div class="score-item"><div class="score-num">${gameScore.total}</div><div class="score-lbl">Toplam</div></div>
    <div class="score-item"><div class="score-num" style="color:var(--p400)">${gameScore.total?Math.round(gameScore.correct/gameScore.total*100):0}%</div><div class="score-lbl">Başarı</div></div>
    <div class="score-item" style="margin-left:8px"><button onclick="showGameSelect()" style="background:none;border:1.5px solid var(--g100);border-radius:var(--rsm);padding:4px 10px;font-family:var(--fn);font-size:12px;color:var(--g600);cursor:pointer">← Oyunlar</button></div>
  </div>`;
}

function rand(arr){return arr[Math.floor(Math.random()*arr.length)];}
function shuffle(arr){return [...arr].sort(()=>Math.random()-.5);}

// ===== BAŞLAT =====
showWelcome();
</script>
